services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: soc_backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      FRONTEND_URL: http://localhost:3000
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: soc_frontend
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend
